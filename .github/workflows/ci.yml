name: Build and Run Task Manager

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-run:
    # Change this from ubuntu-latest to ubuntu-22.04
    runs-on: ubuntu-22.04 


    steps:
      - name: Checkout Application
        uses: actions/checkout@v4

      - name: Checkout Playwright Tests
        uses: actions/checkout@v4
        with:
          repository: 'ManbSingh/playwrightpython'
          path: 'playwright-tests'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Test Dependencies
        run: |
          cd playwright-tests
          pip install -r requirements.txt
          pip install allure-pytest          # Ensures the --alluredir flag works
          playwright install --with-deps

      - name: Build Docker Image
        run: docker build -t taskmanager .

      - name: Start Container
        run: docker run -d -p 5000:5000 --name taskmanager taskmanager

      - name: Wait for Application
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:5000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      # Runs your exact local test command with adjusted repository pathways
      - name: Run Playwright Tests (Matching Local Execution)
        env:
          # Your ConfigHandler looks for APP_USERNAME_QA, APP_PASSWORD_QA, etc.
          QA_APP_USERNAME: ${{ secrets.APP_USERNAME_QA }}
          QA_APP_PASSWORD: ${{ secrets.APP_PASSWORD_QA }}
        run: |
          cd playwright-tests
          pytest apps/tests/taskmanager/test_dashboard.py -s -v --env qa --app taskmanager --alluredir=allure-results

      # Extracts and drops your Allure results into the Actions dashboard summary
      - name: Upload Allure Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: playwright-tests/allure-results/

      - name: Stop Container
        if: always()
        run: |
          docker stop taskmanager || true
          docker rm taskmanager || true
 