name: CI buil & automated tesst - taskmanager

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build-and-run:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Application
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ALL_REPO_ACCESS_TOKEN }}

      - name: Checkout Playwright Tests
        uses: actions/checkout@v4
        with:
          repository: 'ManbSingh/playwrightpython'
          token: ${{ secrets.ALL_REPO_ACCESS_TOKEN }}
          path: 'playwright-tests'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Test Dependencies
        run: |
          cd playwright-tests
          pip install -r requirements.txt
          pip install allure-pytest
          playwright install --with-deps

      - name: Build Docker Image
        run: docker build -t taskmanager .

      - name: Start Container
        run: docker run -d -p 5000:5000 --name taskmanager taskmanager

      - name: Wait for Application
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:5000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      
      - name: Run Playwright Tests
        env:
          APP_USERNAME_DOCKER: ${{ secrets.APP_USERNAME_DOCKER }}
          APP_PASSWORD_DOCKER: ${{ secrets.APP_PASSWORD_DOCKER }}
          DB_USERNAME_DOCKER: ${{ secrets.DB_USERNAME_DOCKER }}
          DB_PASSWORD_DOCKER: ${{ secrets.DB_PASSWORD_DOCKER }}
        run: |
          cd playwright-tests
          echo "=== Debugging Secret Population (Character Count) ==="
          echo "APP_USERNAME_DOCKER length: ${#APP_USERNAME_DOCKER}"
          echo "APP_PASSWORD_DOCKER length: ${#APP_PASSWORD_DOCKER}"
          echo "DB_USERNAME_DOCKER length: ${#DB_USERNAME_DOCKER}"
          echo "DB_PASSWORD_DOCKER length: ${#DB_PASSWORD_DOCKER}"
          echo "====================================================="
          pytest -m unit apps/tests/taskmanager/test_dashboard.py -s -v --env docker --app taskmanager --alluredir=allure-results

      - name: Upload Allure Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: playwright-tests/allure-results/

      - name: Stop Container
        if: always()
        run: |
          docker stop taskmanager || true
          docker rm taskmanager || true